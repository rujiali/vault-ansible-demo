services:
  vault-primary:
    image: hashicorp/vault-enterprise:2.0-ent
    container_name: vault-primary
    hostname: vault-primary
    user: root
    ports:
      - "8200:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - ./config/vault-primary.hcl:/vault/config/vault.hcl
      - ./data/primary:/vault/data
      - ./plugins:/vault/plugins
    cap_add:
      - IPC_LOCK
      - SETFCAP
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault-dr:
    image: hashicorp/vault-enterprise:2.0-ent
    container_name: vault-dr
    hostname: vault-dr
    user: root
    ports:
      - "8202:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - ./config/vault-dr.hcl:/vault/config/vault.hcl
      - ./data/dr:/vault/data
      - ./plugins:/vault/plugins
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net

  vault-pr:
    image: hashicorp/vault-enterprise:2.0-ent
    container_name: vault-pr
    hostname: vault-pr
    user: root
    ports:
      - "8204:8200"
    environment:
      VAULT_LICENSE: ${VAULT_LICENSE}
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - ./config/vault-pr.hcl:/vault/config/vault.hcl
      - ./data/pr:/vault/data
      - ./plugins:/vault/plugins
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    networks:
      - vault-net

  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    hostname: openldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "Corp Example"
      LDAP_DOMAIN: "corp.example.com"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
    volumes:
      - ./data/ldap/db:/var/lib/ldap
      - ./data/ldap/config:/etc/ldap/slapd.d
    networks:
      - vault-net

networks:
  vault-net:
    driver: bridge
